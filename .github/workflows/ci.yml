name: CI

# Структурная проверка small-business-ru: линт скиллов/плагина/маркетплейса
# + смоук-компиляция Python-скриптов + eval контрольных точек калькуляторов.
# Содержание (юр/налоговые нормы) не проверяется: это зона эксперта, CI ловит
# структурные регрессии и арифметику калькуляторов.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint skills, plugins, marketplace
        run: python3 scripts/lint_skills.py

      - name: Нет закоммиченных артефактов (.DS_Store, __pycache__, .pyc)
        run: |
          bad=$(git ls-files | grep -E '\.DS_Store|__pycache__|\.pyc$' || true)
          if [ -n "$bad" ]; then
            echo "В репозитории закоммичены артефакты:"; echo "$bad"; exit 1
          fi
          echo "Артефактов нет."

      - name: Smoke-compile all Python scripts
        run: |
          set -e
          found=$(find . -path ./.git -prune -o -name '*.py' -print)
          if [ -n "$found" ]; then
            echo "$found" | xargs -I{} python3 -m py_compile "{}"
            echo "Все .py скомпилировались без синтаксических ошибок."
          else
            echo "Python-скриптов не найдено — пропуск."
          fi

      - name: Eval — контрольные точки калькуляторов
        run: python3 eval/run_eval.py
